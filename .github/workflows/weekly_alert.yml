name: Weekly Deal Alert

on:
  schedule:
    # Every Friday at 05:00 UTC = 13:00 HKT
    - cron: '0 5 * * 5'
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest deals from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          if [ -n "$R2_ENDPOINT" ] && [ -n "$R2_BUCKET" ]; then
            aws s3 cp "s3://$R2_BUCKET/deals.json" data/deals.json \
              --endpoint-url "$R2_ENDPOINT" \
              --content-type application/json
            echo "Downloaded deals.json from R2"
          else
            echo "R2 not configured, using local deals.json"
          fi

      - name: Run weekly alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m src.weekly_alert
